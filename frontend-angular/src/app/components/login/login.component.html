<div class="main-container">
  <div class="login-wrapper">
    <div class="login-card">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <h2 class="megasus-title">
          Megasus <span class="ai-text">AI</span>
        </h2>
        <p class="subtitle">Acceso al Sistema</p>
        
        <div class="field">
          <input type="email" formControlName="email" id="email" placeholder="Email" class="glass-input">
        </div>

        <div class="field password-field">
          <input type="password" formControlName="password" id="password" placeholder="Contraseña" class="glass-input">
          <span class="password-toggle">👁️</span>
        </div>

        <div class="button-wrapper">
          <button type="submit" [disabled]="loginForm.invalid" class="login-button">
            Ingresar
          </button>
        </div>
        
        <p *ngIf="error" class="error-message">{{ error }}</p>
      </form>
    </div>
  </div>
</div>
